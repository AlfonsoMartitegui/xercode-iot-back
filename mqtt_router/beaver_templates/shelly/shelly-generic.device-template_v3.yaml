definition:
  input:
    type: object
    properties:
      - key: device_id
        type: string
        required: true
        is_device_id: true
        entity_mapping: 'device_id'

      - key: device_name
        type: string
        is_device_name: true

      - key: vendor
        type: string
        entity_mapping: 'vendor'

      - key: model
        type: string
        entity_mapping: 'model'

      - key: mac
        type: string
        entity_mapping: 'mac'

      - key: ip
        type: string
        entity_mapping: 'ip'

      - key: fw_ver
        type: string
        entity_mapping: 'fw_ver'

      - key: time
        type: string
        entity_mapping: 'time'

      - key: rssi
        type: long
        entity_mapping: 'rssi'

      # Relay / plug / power-meter Shelly devices
      - key: power
        type: double
        entity_mapping: 'power'

      - key: energy
        type: double
        entity_mapping: 'energy'

      - key: voltage
        type: double
        entity_mapping: 'voltage'

      - key: current
        type: double
        entity_mapping: 'current'

      - key: output
        type: boolean
        entity_mapping: 'output'

      - key: overtemperature
        type: long
        entity_mapping: 'overtemperature'

      # Generic environmental values
      - key: temperature
        type: double
        entity_mapping: 'temperature'

      - key: temperature_f
        type: double
        entity_mapping: 'temperature_f'

      - key: humidity
        type: double
        entity_mapping: 'humidity'

      - key: lux
        type: double
        entity_mapping: 'lux'

      - key: battery
        type: double
        entity_mapping: 'battery'

      # Door / window / motion / flood / security sensors
      - key: state
        type: string
        entity_mapping: 'state'

      - key: open
        type: boolean
        entity_mapping: 'open'

      - key: tilt
        type: long
        entity_mapping: 'tilt'

      - key: vibration
        type: boolean
        entity_mapping: 'vibration'

      - key: motion
        type: boolean
        entity_mapping: 'motion'

      - key: flood
        type: boolean
        entity_mapping: 'flood'

      - key: smoke
        type: boolean
        entity_mapping: 'smoke'

      - key: gas
        type: boolean
        entity_mapping: 'gas'

      - key: tamper
        type: boolean
        entity_mapping: 'tamper'

      - key: error
        type: long
        entity_mapping: 'error'

      - key: act_reasons
        type: string
        entity_mapping: 'act_reasons'

initial_entities:
  - identifier: 'device_id'
    name: 'device_id'
    value_type: string
    type: property
    access_mod: R

  - identifier: 'vendor'
    name: 'vendor'
    value_type: string
    type: property
    access_mod: R

  - identifier: 'model'
    name: 'model'
    value_type: string
    type: property
    access_mod: R

  - identifier: 'mac'
    name: 'mac'
    value_type: string
    type: property
    access_mod: R

  - identifier: 'ip'
    name: 'ip'
    value_type: string
    type: property
    access_mod: R

  - identifier: 'fw_ver'
    name: 'fw_ver'
    value_type: string
    type: property
    access_mod: R

  - identifier: 'time'
