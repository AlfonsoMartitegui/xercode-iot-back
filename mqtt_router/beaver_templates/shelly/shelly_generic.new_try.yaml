definition:
  input:
    type: object
    properties:
      - key: device_id
        type: string
        required: true
        is_device_id: true
        entity_mapping: 'device_id'

      - key: device_name
        type: string
        is_device_name: true

      - key: vendor
        type: string
        entity_mapping: 'vendor'

      - key: power
        type: double
        entity_mapping: 'power'

      - key: energy
        type: double
        entity_mapping: 'energy'

      - key: voltage
        type: double
        entity_mapping: 'voltage'

      - key: current
        type: double
        entity_mapping: 'current'

      - key: output
        type: boolean
        entity_mapping: 'output'

      - key: temperature
        type: double
        entity_mapping: 'temperature'

      - key: temperature_f
        type: double
        entity_mapping: 'temperature_f'

      - key: overtemperature
        type: long
        entity_mapping: 'overtemperature'

      - key: time
        type: string
        entity_mapping: 'time'

      - key: wifi_connected
        type: boolean
        entity_mapping: 'wifi_sta.connected'

      - key: wifi_ssid
        type: string
        entity_mapping: 'wifi_sta.ssid'

      - key: wifi_ip
        type: string
        entity_mapping: 'wifi_sta.ip'

      - key: wifi_rssi
        type: long
        entity_mapping: 'wifi_sta.rssi'

      - key: cloud_enabled
        type: boolean
        entity_mapping: 'cloud.enabled'

      - key: cloud_connected
        type: boolean
        entity_mapping: 'cloud.connected'

      - key: mqtt_connected
        type: boolean
        entity_mapping: 'mqtt.connected'

      - key: unixtime
        type: long
        entity_mapping: 'unixtime'

      - key: serial
        type: long
        entity_mapping: 'serial'

      - key: has_update
        type: boolean
        entity_mapping: 'has_update'

      - key: mac
        type: string
        entity_mapping: 'mac'

      - key: cfg_changed_cnt
        type: long
        entity_mapping: 'cfg_changed_cnt'

      - key: actions_skipped
        type: long
        entity_mapping: 'actions_stats.skipped'

      - key: sleep_time
        type: long
        entity_mapping: 'sleep_time'

      - key: lux
        type: double
        entity_mapping: 'lux.value'

      - key: illumination
        type: string
        entity_mapping: 'lux.illumination'

      - key: lux_valid
        type: boolean
        entity_mapping: 'lux.is_valid'

      - key: vibration
        type: boolean
        entity_mapping: 'sensor.vibration'

      - key: motion
        type: boolean
        entity_mapping: 'sensor.motion'

      - key: sensor_timestamp
        type: long
        entity_mapping: 'sensor.timestamp'

      - key: sensor_active
        type: boolean
        entity_mapping: 'sensor.active'

      - key: sensor_valid
        type: boolean
        entity_mapping: 'sensor.is_valid'

      - key: battery
        type: double
        entity_mapping: 'bat.value'

      - key: battery_voltage
        type: double
        entity_mapping: 'bat.voltage'

      - key: charger
        type: boolean
        entity_mapping: 'charger'

      - key: update_status
        type: string
        entity_mapping: 'update.status'

      - key: update_available
        type: boolean
        entity_mapping: 'update.has_update'

      - key: update_new_version
        type: string
        entity_mapping: 'update.new_version'

      - key: update_old_version
        type: string
        entity_mapping: 'update.old_version'
   
      - key: ram_total
        type: long
        entity_mapping: 'ram_total'

      - key: ram_free
        type: long
        entity_mapping: 'ram_free'

      - key: fs_size
        type: long
        entity_mapping: 'fs_size'

      - key: fs_free
        type: long
        entity_mapping: 'fs_free'

      - key: uptime
        type: long
        entity_mapping: 'uptime'

      - key: fw_device
        type: string
        entity_mapping: 'fw_info.device'

      - key: firmware
        type: string
        entity_mapping: 'fw_info.fw'

      - key: ps_mode
        type: long
        entity_mapping: 'ps_mode'

      - key: dbg_flags
        type: long
        entity_mapping: 'dbg_flags'

initial_entities:
  - identifier: 'device_id'
    name: 'device_id'
    value_type: string
    type: property
    access_mod: R

  - identifier: 'vendor'
    name: 'vendor'
